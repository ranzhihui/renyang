{% extends "base.html" %}
{% block title %}注册 - 葡萄树认养平台{% endblock %}
{% block content %}
<div style="display:flex;justify-content:center;padding-top:20px;">
    <div class="form-card">
        <h2 style="text-align:center;margin-bottom:8px;">&#9997; 用户注册</h2>
        <p style="text-align:center;font-size:13px;color:var(--text-secondary);margin-bottom:16px;">选择角色开始你的葡萄树认养之旅</p>
        <form method="post">
            <label>用户名</label>
            <input type="text" name="username" placeholder="请输入用户名" required>

            <label>密码</label>
            <input type="password" name="password" placeholder="请输入密码" required>

            <label>角色</label>
            <select name="role" required>
                <option value="buyer">买家用户（认养葡萄树）</option>
                <option value="worker">工作人员（管理农事）</option>
            </select>

            <button type="submit">注册</button>
        </form>
        <p style="text-align:center;margin-top:14px;font-size:13px;">已有账号？<a href="{{ url_for('login') }}">去登录</a></p>
    </div>
</div>
{% endblock %}
